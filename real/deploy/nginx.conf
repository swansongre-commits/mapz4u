# MAPZ 운영 역방향 프록시 (§4.1)
# 정적파일 직접 서빙 + 기본 rate limit + 요청 로깅
limit_req_zone $binary_remote_addr zone=mapz_rl:10m rate=10r/s;

server {
    listen 80;
    server_name _;   # 도메인 연결 시 교체 (§1.1 상표·도메인)

    access_log /var/log/nginx/mapz_access.log;
    error_log  /var/log/nginx/mapz_error.log;

    # 정적파일은 nginx가 직접 서빙 (앱 부하 감소)
    location /static/ {
        alias /srv/static/;
        expires 1h;
        add_header Cache-Control "public";
    }

    location / {
        limit_req zone=mapz_rl burst=20 nodelay;
        proxy_pass http://mapz:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # TLS 예시 (Let's Encrypt) — 인증서 발급 후 주석 해제
    # listen 443 ssl;
    # ssl_certificate     /etc/letsencrypt/live/DOMAIN/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/DOMAIN/privkey.pem;
}
