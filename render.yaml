# MAPZ 운영버전 배포 (Render.com Blueprint)
# 서비스명 mapz4u -> 주소 https://mapz4u.onrender.com
# 빌드 시 커밋된 data/clean 에서 DB를 재생성(외부 API 호출 없음).
services:
  - type: web
    name: mapz4u
    runtime: python
    rootDir: real
    plan: free
    region: singapore            # 한국에서 가까운 리전
    buildCommand: >-
      pip install -r deploy/requirements.txt &&
      python scripts/build_linkage.py &&
      python scripts/build_db.py &&
      python scripts/freshness.py
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.6"
      - key: MAPZ_RATE_LIMIT
        value: "180"
      - key: MAPZ_RUN_DATE
        value: "2026-07-04"
      - key: MAPZ_ADMIN_PW
        sync: false            # 대시보드에서 직접 입력 (제휴콘솔 별도 배포 시 사용)
